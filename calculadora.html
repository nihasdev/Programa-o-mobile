<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .fundo{
            background-image: linear-gradient(45deg,rgb(121, 15, 15),purple);
            text-align: center;
            height: 100vh;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        .Calculadora{
            position: absolute;
            background-color:rgba(0, 0, 0, 0.8);
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            border-radius: 15px;
            padding: 15px;
        }
        .botão{
            width: 50px;
            height: 50px;
            font-size: 25px;
            cursor: pointer;
            margin: 3px;
            background-color: rgb(31, 31, 31);
            border: none;
            color: white;
        }
        .botão:hover{
            background-color: black;
        }
        #resultado{
            width: 207px;
            background-color: white;
            height: 30px;
            margin: 14px;
            font-size: 25px;
            color: rgb(53, 26, 26);
            text-align: right;
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
     <div class="fundo"><h1></h1>
     
     <div class="Calculadora"> <h1>Calculadora</h1>
        <p id="resultado"></p>
        <table>
            <tr>
            <td><button class="botão" onclick="clean()">C</button></td>
            <td><button class="botão"></button></td>
            <td><button class="botão"onclick="insert(/)">/</button></td>
            <td><button class="botão"onclick="insert(*)">X</button></td>
            </tr>
            <tr>
            <td><button class="botão" onclick="insert(7)">7</button></td>
            <td><button class="botão" onclick="insert(8)">8</button></td>
            <td><button class="botão" onclick="insert(9)">9</button></td>
            <td><button class="botão" onclick="insert('-')">-</button></td>
            </tr>
            <tr>
            <td><button class="botão" onclick="insert(4)">4</button></td>
            <td><button class="botão" onclick="insert(5)">5</button></td>
            <td><button class="botão" onclick="insert(6)">6</button></td>
            <td><button class="botão" onclick="insert('+')">+</button></td>
            </tr>
            <tr>
            <td><button class="botão" onclick="insert(1)">1</button></td>
            <td><button class="botão" onclick="insert(2)">2</button></td>
            <td><button class="botão" onclick="insert(3)">3</button></td>
            <td rowspan="2"><button class="botão" style="height: 103px;">=</button></td>
            </tr>
            <tr>
            <td colspan="2"><button class="botão" style="width: 103px;" onclick="insert(0)">0</button></td>
            <td><button class="botão">.</button></td>
            </tr>
            </table>
        </div>
       
        
     </div>
     <script>
        function insert(num)
        {
            var numero = document.getElementById(resultado).innerHTML;
            document.getElementById(resultado).innerHTML = numero + num;

        }
        function clean()
        {
            document.getElementById(resultado).innerHTML= ""
        }
    
    
     </script>
</body>
</html>
